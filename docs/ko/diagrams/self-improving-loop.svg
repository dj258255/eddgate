<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 520" fill="none">
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .step-num { font-size: 13px; fill: #94a3b8; font-weight: 600; }
    .step-label { font-size: 15px; fill: #e2e8f0; font-weight: 600; }
    .step-desc { font-size: 12px; fill: #94a3b8; }
    .note { font-size: 11px; fill: #64748b; font-style: italic; }
    .connector { stroke: #475569; stroke-width: 1.5; }
    .box { fill: #1e293b; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .box-active { fill: #172554; stroke: #3b82f6; stroke-width: 1.5; rx: 8; }
    .repeat { font-size: 12px; fill: #3b82f6; font-weight: 600; }
  </style>

  <rect width="440" height="520" fill="#0f172a" rx="12"/>

  <!-- Step 1 -->
  <rect class="box-active" x="60" y="20" width="320" height="48"/>
  <text class="step-num" x="80" y="42">1.</text>
  <text class="step-label" x="104" y="42">실행</text>
  <text class="step-desc" x="148" y="42">검증 게이트와 함께 워크플로우 실행</text>

  <line class="connector" x1="220" y1="68" x2="220" y2="96"/>
  <polygon points="215,92 220,100 225,92" fill="#475569"/>

  <!-- Step 2 -->
  <rect class="box" x="60" y="100" width="320" height="48"/>
  <text class="step-num" x="80" y="122">2.</text>
  <text class="step-label" x="104" y="122">분석</text>
  <text class="step-desc" x="148" y="122">실패 패턴 분석, 규칙 자동 생성</text>

  <line class="connector" x1="220" y1="148" x2="220" y2="176"/>
  <polygon points="215,172 220,180 225,172" fill="#475569"/>

  <!-- Step 3 -->
  <rect class="box-active" x="60" y="180" width="320" height="48"/>
  <text class="step-num" x="80" y="202">3.</text>
  <text class="step-label" x="104" y="202">실행</text>
  <text class="step-desc" x="148" y="202">다시 실행 -- 생성된 규칙 자동 적용</text>

  <line class="connector" x1="220" y1="228" x2="220" y2="256"/>
  <polygon points="215,252 220,260 225,252" fill="#475569"/>

  <!-- Step 4 -->
  <rect class="box" x="60" y="260" width="320" height="48"/>
  <text class="step-num" x="80" y="282">4.</text>
  <text class="step-label" x="104" y="282">테스트 스냅샷</text>
  <text class="step-desc" x="220" y="282">현재 동작을 기준선으로 저장</text>

  <line class="connector" x1="220" y1="308" x2="220" y2="336"/>
  <polygon points="215,332 220,340 225,332" fill="#475569"/>

  <!-- Modify note -->
  <rect x="100" y="340" width="240" height="32" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" rx="6"/>
  <text class="note" x="144" y="360">(프롬프트/워크플로우 수정)</text>

  <line class="connector" x1="220" y1="372" x2="220" y2="400"/>
  <polygon points="215,396 220,404 225,396" fill="#475569"/>

  <!-- Step 5 -->
  <rect class="box" x="60" y="404" width="320" height="48"/>
  <text class="step-num" x="80" y="426">5.</text>
  <text class="step-label" x="104" y="426">테스트 비교</text>
  <text class="step-desc" x="206" y="426">기준선 대비 회귀 감지</text>

  <line class="connector" x1="220" y1="452" x2="220" y2="476"/>
  <polygon points="215,472 220,480 225,472" fill="#475569"/>

  <!-- Repeat -->
  <text class="repeat" x="196" y="498">... 반복</text>

  <!-- Cycle arrow -->
  <path d="M 390 440 C 420 440, 430 300, 430 44 C 430 30, 420 20, 400 20"
        stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-dasharray="6,3"
        marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
