<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" fill="none">
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .axis-label { font-size: 12px; fill: #94a3b8; font-weight: 600; }
    .name { font-size: 12px; fill: #e2e8f0; font-weight: 600; }
    .desc { font-size: 10px; fill: #64748b; }
    .target { font-size: 13px; fill: #3b82f6; font-weight: 700; }
    .target-desc { font-size: 10px; fill: #60a5fa; }
    .dot { r: 6; }
    .axis { stroke: #334155; stroke-width: 1; }
  </style>

  <rect width="560" height="480" fill="#0f172a" rx="12"/>

  <line class="axis" x1="80" y1="440" x2="80" y2="40"/>
  <line class="axis" x1="80" y1="240" x2="520" y2="240"/>

  <text class="axis-label" x="300" y="470" text-anchor="middle">eddgate 평가 통합 -></text>
  <text class="axis-label" x="30" y="244" text-anchor="middle" transform="rotate(-90 30 244)">복잡도 -></text>

  <text class="desc" x="90" y="456">단순함</text>
  <text class="desc" x="480" y="456">통합</text>
  <text class="desc" x="68" y="430" text-anchor="end">낮음</text>
  <text class="desc" x="68" y="56" text-anchor="end">높음</text>

  <!-- Competitors -->
  <circle class="dot" cx="160" cy="90" fill="#f87171"/>
  <text class="name" x="178" y="86">Ruflo</text>
  <text class="desc" x="178" y="100">(야심적/미검증)</text>

  <circle class="dot" cx="420" cy="90" fill="#f87171"/>
  <text class="name" x="438" y="86">LangGraph</text>
  <text class="desc" x="438" y="100">(범용/비코딩특화)</text>

  <circle class="dot" cx="120" cy="180" fill="#f87171"/>
  <text class="name" x="138" y="176">MetaGPT</text>
  <text class="desc" x="138" y="190">(경직/방치)</text>

  <circle class="dot" cx="440" cy="180" fill="#f87171"/>
  <text class="name" x="458" y="176">CrewAI</text>
  <text class="desc" x="458" y="190">(메모리 한계)</text>

  <text class="desc" x="90" y="232">단순함</text>

  <circle class="dot" cx="140" cy="330" fill="#f87171"/>
  <text class="name" x="158" y="326">SWE-Agent</text>
  <text class="desc" x="158" y="340">(최소/학술)</text>

  <circle class="dot" cx="120" cy="390" fill="#f87171"/>
  <text class="name" x="138" y="386">Aider</text>
  <text class="desc" x="138" y="400">(단일/대화형)</text>

  <!-- eddgate -->
  <circle cx="430" cy="330" r="10" fill="#3b82f6" opacity="0.3"/>
  <circle cx="430" cy="330" r="6" fill="#3b82f6"/>
  <text class="target" x="448" y="326">eddgate CLI</text>
  <text class="target-desc" x="450" y="342">(실용적 eddgate)</text>
  <text class="target-desc" x="450" y="362">&lt;- 여기</text>
</svg>
