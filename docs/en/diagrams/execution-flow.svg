<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 880" fill="none">
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .title { font-size: 13px; fill: #e2e8f0; font-weight: 700; }
    .desc { font-size: 11px; fill: #94a3b8; }
    .pass { font-size: 11px; fill: #4ade80; }
    .fail { font-size: 11px; fill: #f87171; }
    .io { font-size: 13px; fill: #cbd5e1; font-weight: 600; }
    .connector { stroke: #475569; stroke-width: 1.5; }
    .box { rx: 8; }
  </style>

  <rect width="480" height="880" fill="#0f172a" rx="12"/>

  <!-- User Input -->
  <rect class="box" x="160" y="16" width="160" height="36" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text class="io" x="240" y="39" text-anchor="middle">User Input</text>
  <line class="connector" x1="240" y1="52" x2="240" y2="72"/>
  <polygon points="236,68 240,76 244,68" fill="#475569"/>

  <!-- Load workflow -->
  <rect class="box" x="80" y="76" width="320" height="52" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text class="title" x="100" y="98">Load workflow from Config Store</text>
  <text class="desc" x="100" y="114">eddgate run document-pipeline --input "..."</text>
  <line class="connector" x1="240" y1="128" x2="240" y2="148"/>
  <polygon points="236,144 240,152 244,144" fill="#475569"/>

  <!-- Step 1 -->
  <rect class="box" x="80" y="152" width="320" height="80" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text class="title" x="100" y="174">Step 1: classify</text>
  <text class="desc" x="100" y="192">Context Builder -> minimal context</text>
  <text class="desc" x="100" y="206">Agent Runner -> execute agent</text>
  <text class="desc" x="100" y="220">Tier 1 validation -> schema / required fields</text>
  <text class="pass" x="310" y="220">Pass -> next</text>
  <text class="fail" x="310" y="174">Fail -> STOP</text>
  <line class="connector" x1="240" y1="232" x2="240" y2="252"/>
  <polygon points="236,248 240,256 244,248" fill="#475569"/>

  <!-- Step 2 -->
  <rect class="box" x="80" y="256" width="320" height="68" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text class="title" x="100" y="278">Step 2: retrieve</text>
  <text class="desc" x="100" y="296">(Same flow)</text>
  <text class="desc" x="100" y="310">Tool: web_search MCP call</text>
  <line class="connector" x1="240" y1="324" x2="240" y2="344"/>
  <polygon points="236,340 240,348 244,340" fill="#475569"/>

  <!-- Step 3 -->
  <rect class="box" x="80" y="348" width="320" height="80" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text class="title" x="100" y="370">Step 3-1~3: generate (3 sub-steps)</text>
  <text class="desc" x="100" y="388">On sub-step 3 completion:</text>
  <text class="desc" x="100" y="404">Tier 2 LLM eval (groundedness)</text>
  <text class="pass" x="100" y="420">>= 0.7: pass</text>
  <text class="fail" x="220" y="420">&lt; 0.7: flag or retry</text>
  <line class="connector" x1="240" y1="428" x2="240" y2="448"/>
  <polygon points="236,444 240,452 244,444" fill="#475569"/>

  <!-- Step 4 -->
  <rect class="box" x="80" y="452" width="320" height="56" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text class="title" x="100" y="474">Step 4: structure</text>
  <text class="desc" x="100" y="492">Tier 1 validation -> outline structure</text>
  <line class="connector" x1="240" y1="508" x2="240" y2="528"/>
  <polygon points="236,524 240,532 244,524" fill="#475569"/>

  <!-- Step 5 -->
  <rect class="box" x="80" y="532" width="320" height="56" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text class="title" x="100" y="554">Step 5: patch</text>
  <text class="desc" x="100" y="572">Generate FINAL_DRAFT</text>
  <line class="connector" x1="240" y1="588" x2="240" y2="608"/>
  <polygon points="236,604 240,612 244,604" fill="#475569"/>

  <!-- Step 6 -->
  <rect class="box" x="80" y="612" width="320" height="100" fill="#172554" stroke="#f59e0b" stroke-width="1.5"/>
  <text class="title" x="100" y="634">Step 6: validate_final</text>
  <text class="desc" x="100" y="654">Tier 2 LLM eval (full validation)</text>
  <text class="pass" x="100" y="674">All rules Pass -> complete</text>
  <text class="fail" x="100" y="692">Any Fail -> retry from Step 5</text>
  <text class="fail" x="100" y="706">maxRetries exceeded -> hand off to human</text>

  <!-- Retry arrow -->
  <path d="M 400 680 C 440 680, 450 570, 400 558"
        stroke="#f87171" stroke-width="1.5" fill="none" stroke-dasharray="5,3"
        marker-end="url(#retryArrow)"/>
  <defs>
    <marker id="retryArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f87171"/>
    </marker>
  </defs>

  <line class="connector" x1="240" y1="712" x2="240" y2="740"/>
  <polygon points="236,736 240,744 244,736" fill="#475569"/>

  <!-- Output -->
  <rect class="box" x="100" y="744" width="280" height="44" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text class="io" x="240" y="770" text-anchor="middle">Final output + execution trace</text>
</svg>
