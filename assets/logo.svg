<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <!-- Loop arrow (the self-improving cycle) -->
