<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background -->
  <circle cx="64" cy="64" r="60" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <!-- Circular arrow loop -->
  <path d="M 82 44 A 28 28 0 0 1 82 84" stroke="#58a6ff" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M 46 84 A 28 28 0 0 1 46 44" stroke="#58a6ff" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Arrow heads -->
  <polygon points="82,40 90,46 82,52" fill="#58a6ff"/>
  <polygon points="46,88 38,82 46,76" fill="#58a6ff"/>

  <!-- Gate left (on the left arc) -->
  <rect x="32" y="58" width="4" height="12" rx="2" fill="#3fb950"/>
  <rect x="38" y="58" width="4" height="12" rx="2" fill="#3fb950"/>

  <!-- Gate right (on the right arc) -->
  <rect x="86" y="58" width="4" height="12" rx="2" fill="#3fb950"/>
  <rect x="92" y="58" width="4" height="12" rx="2" fill="#3fb950"/>

  <!-- Center checkpoint -->
  <circle cx="64" cy="64" r="8" fill="#d29922"/>

  <!-- Inner ring (subtle) -->
  <circle cx="64" cy="64" r="14" stroke="#d29922" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>
