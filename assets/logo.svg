<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    eddgate logo
    Concept: "Circle with a gate notch"
    - Circle = evaluation loop (run -> analyze -> test -> run)
    - Notch/gap = the gate (validation checkpoint)
    - Dot = the eval point
    Describable: "a broken circle with a dot"
  -->

  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="#0d1117"/>

  <!-- Main arc: thick broken circle with gate gap on the right -->
  <!-- Top arc -->
  <path
    d="M 176 100 A 180 180 0 0 1 380 180"
    stroke="#58a6ff"
    stroke-width="36"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Bottom arc -->
  <path
    d="M 380 332 A 180 180 0 0 1 176 412"
    stroke="#58a6ff"
    stroke-width="36"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Left connecting arc -->
  <path
    d="M 176 412 A 180 180 0 0 1 176 100"
    stroke="#58a6ff"
    stroke-width="36"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Gate bars in the gap (right side) -->
  <rect x="374" y="200" width="12" height="48" rx="6" fill="#3fb950"/>
  <rect x="374" y="264" width="12" height="48" rx="6" fill="#3fb950"/>

  <!-- Center eval dot -->
  <circle cx="256" cy="256" r="32" fill="#d29922"/>
</svg>
