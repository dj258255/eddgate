<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    eddgate logo
    "Looping circle with gate and arrow"
    - Arc with arrow = the loop keeps going (run -> analyze -> test -> run)
    - Gate gap with bars = validation checkpoint
    - Center dot = evaluation point
  -->

  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="#0d1117"/>

  <!-- Main loop arc (270 degrees, gap at top-right for the gate) -->
  <path
    d="M 340 108 A 170 170 0 1 1 172 108"
    stroke="#58a6ff"
    stroke-width="34"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Arrow head at the end of arc (pointing right-downward, showing loop direction) -->
  <polygon points="345,82 372,112 340,128" fill="#58a6ff"/>

  <!-- Gate bars in the gap (top, between arrow and arc start) -->
  <rect x="214" y="80" width="12" height="44" rx="6" fill="#3fb950"/>
  <rect x="238" y="80" width="12" height="44" rx="6" fill="#3fb950"/>

  <!-- Center eval dot -->
  <circle cx="256" cy="256" r="30" fill="#d29922"/>
</svg>
